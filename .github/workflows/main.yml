name: System-Diagnostics-Windows
on:
  workflow_dispatch:

jobs:
  diagnostic-run:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # ============================================
      # STEP 1: Enable RDP
      # ============================================
      - name: Initialize Environment
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "RDP enabled successfully"

      # ============================================
      # STEP 2: Create Debug User
      # ============================================
      - name: Provision Debug User
        shell: pwsh
        run: |
          $charList = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#"
          $randomPassword = -join (1..16 | ForEach-Object { $charList[(Get-Random -Maximum $charList.Length)] })
          
          $user = "SystemDebug"
          $secPass = ConvertTo-SecureString $randomPassword -AsPlainText -Force
          
          New-LocalUser -Name $user -Password $secPass -FullName "Diagnostic Account" -Description "Used for system debugging"
          Add-LocalGroupMember -Group "Administrators" -Member $user
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user
          
          Write-Host "::notice title=Access Credentials::User: $user | Password: $randomPassword"
          echo "DEBUG_USER=$user" >> $env:GITHUB_ENV
          echo "DEBUG_PASS=$randomPassword" >> $env:GITHUB_ENV

      # ============================================
      # STEP 3: Install & Run Cloudflare Tunnel
      # ============================================
      - name: Network Layer Setup (Cloudflare Tunnel)
        shell: pwsh
        run: |
          $downloadPath = "$env:TEMP\cloudflared.exe"
          
          # Download
          Write-Host "Downloading cloudflared..."
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile $downloadPath
          
          # Run tunnel with logging
          Write-Host "Starting Cloudflare Tunnel..."
          $process = Start-Process -FilePath $downloadPath -ArgumentList @(
              "tunnel", "run",
              "--token", "${{ secrets.CF_TUNNEL_TOKEN }}"
          ) -WindowStyle Hidden -PassThru -RedirectStandardOutput "$env:TEMP\tunnel.log" -RedirectStandardError "$env:TEMP\tunnel.err"
          
          # Wait and verify
          Start-Sleep -Seconds 20
          
          $logContent = Get-Content "$env:TEMP\tunnel.log" -ErrorAction SilentlyContinue
          $errContent = Get-Content "$env:TEMP\tunnel.err" -ErrorAction SilentlyContinue
          
          Write-Host "=== TUNNEL OUTPUT ==="
          Write-Host $logContent
          if ($errContent) {
              Write-Host "=== TUNNEL ERRORS ==="
              Write-Host $errContent
          }
          
          if ($logContent -match "Registered tunnel connection") {
              Write-Host "::notice title=Cloudflare Tunnel::✅ Tunnel is ACTIVE - rdp.alqawan.com is ready"
          } else {
              Write-Error "❌ Tunnel failed to start!"
              exit 1
          }

      # ============================================
      # STEP 4: Keep Alive
      # ============================================
      - name: System Stability Wait
        shell: pwsh
        run: |
          Write-Host "=================================================="
          Write-Host "  ✅ DIAGNOSTIC ENVIRONMENT IS ACTIVE"
          Write-Host "=================================================="
          Write-Host ""
          Write-Host "  🌐 Browser: https://rdp.alqawan.com"
          Write-Host "  👤 User: $env:DEBUG_USER"
          Write-Host "  🔑 Password: $env:DEBUG_PASS"
          Write-Host ""
          Write-Host "  💻 Native RDP:"
          Write-Host "     1. Run: cloudflared access rdp --hostname rdp.alqawan.com --url rdp://localhost:13389"
          Write-Host "     2. Connect RDP to: localhost:13389"
          Write-Host ""
          Write-Host "  ⏱️  Auto-terminate in 6 hours"
          Write-Host "=================================================="
          
          $duration = 21000
          $elapsed = 0
          while ($elapsed -lt $duration) {
              Write-Progress -Activity "Running System Diagnostics" -Status "Monitoring Services..." -PercentComplete (($elapsed / $duration) * 100)
              Start-Sleep -Seconds 60
              $elapsed += 60
          }
