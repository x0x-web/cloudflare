name: System-Diagnostics-Windows
on:
  workflow_dispatch:

jobs:
  diagnostic-run:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Initialize Environment
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          # DISABLE NLA - easier for remote access via tunnel
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "RDP enabled (NLA disabled for tunnel access)"

      - name: Provision Debug User
        shell: pwsh
        run: |
          $charList = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#"
          $randomPassword = -join (1..16 | ForEach-Object { $charList[(Get-Random -Maximum $charList.Length)] })
          
          $user = "SystemDebug"
          $secPass = ConvertTo-SecureString $randomPassword -AsPlainText -Force
          
          New-LocalUser -Name $user -Password $secPass -FullName "Diagnostic Account" -Description "Used for system debugging"
          Add-LocalGroupMember -Group "Administrators" -Member $user
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user
          
          # Ensure password never expires
          Set-LocalUser -Name $user -PasswordNeverExpires $true
          
          Write-Host "::notice title=Access Credentials::User: $user | Password: $randomPassword"
          echo "DEBUG_USER=$user" >> $env:GITHUB_ENV
          echo "DEBUG_PASS=$randomPassword" >> $env:GITHUB_ENV

      - name: Network Layer Setup (Cloudflare Tunnel)
        shell: pwsh
        run: |
          $downloadPath = "$env:TEMP\cloudflared.exe"
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile $downloadPath
          
          Start-Process -FilePath $downloadPath -ArgumentList @(
              "tunnel", "run",
              "--token", "${{ secrets.CF_TUNNEL_TOKEN }}"
          ) -WindowStyle Hidden
          
          Start-Sleep -Seconds 20
          Write-Host "::notice title=Cloudflare Tunnel::✅ Tunnel ACTIVE - rdb.alqawan.com"

      - name: System Stability Wait
        shell: pwsh
        run: |
          Write-Host "=================================================="
          Write-Host "  ✅ RDP Ready at: rdb.alqawan.com"
          Write-Host "  👤 User: $env:DEBUG_USER"
          Write-Host "  🔑 Password: $env:DEBUG_PASS"
          Write-Host ""
          Write-Host "  🌐 Browser: https://rdb.alqawan.com"
          Write-Host "  💻 Native: cloudflared access rdp --hostname rdb.alqawan.com --url rdp://localhost:13389"
          Write-Host "  ⚠️  NLA is DISABLED - use plain username/password"
          Write-Host "=================================================="
          
          $duration = 21000
          $elapsed = 0
          while ($elapsed -lt $duration) {
              Write-Progress -Activity "Running System Diagnostics" -Status "Monitoring..." -PercentComplete (($elapsed / $duration) * 100)
              Start-Sleep -Seconds 60
              $elapsed += 60
          }
